  @keyframes splashFadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes splashFadeOut { from { opacity: 1; background: #0F1A2E; } 60% { background: #FFFFFF; } to { opacity: 0; background: #FFFFFF; } }

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, createContext, useContext } = React;

// ---------- Icons (minimal, hand-crafted strokes, 1.5) ----------
const I = ({ d, size=18, stroke=1.5, fill='none' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const IconCheck = (p) => <I {...p} d={<polyline points="4 12 10 18 20 6" />} />;
const IconCircle = (p) => <I {...p} d={<circle cx="12" cy="12" r="8" />} />;
const IconAlert = (p) => <I {...p} d={<><path d="M12 3 2 20h20L12 3z"/><path d="M12 10v5"/><circle cx="12" cy="18" r=".6" fill="currentColor" stroke="none"/></>} />;
const IconArrowRight = (p) => <I {...p} d={<><line x1="4" y1="12" x2="20" y2="12"/><polyline points="14 6 20 12 14 18"/></>} />;
const IconArrowLeft = (p) => <I {...p} d={<><line x1="20" y1="12" x2="4" y2="12"/><polyline points="10 18 4 12 10 6"/></>} />;
const IconChevDown = (p) => <I {...p} d={<polyline points="6 9 12 15 18 9" />} />;
const IconPlay = (p) => <I {...p} fill="currentColor" stroke="none" d={<polygon points="7 5 19 12 7 19 7 5" />} />;
const IconMail = (p) => <I {...p} d={<><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></>} />;
const IconWhats = (p) => <I {...p} d={<><path d="M4 20l1.5-4A8 8 0 1 1 9 20H4z"/><path d="M9 10.5c.5 2 2 3.5 4 4l1.2-1.2c.3-.3.7-.4 1-.2l1.6.8c.4.2.6.6.4 1-.5 1.4-2 2.1-3.6 1.6-2.8-.7-5-2.9-5.7-5.7-.5-1.6.2-3.1 1.6-3.6.4-.2.8 0 1 .4l.8 1.6c.2.3.1.7-.2 1L9 10.5z"/></>} />;
const IconShare = (p) => <I {...p} d={<><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 13v3"/><path d="M12 10v6"/><path d="M16 7v9"/></>} />;
const IconGlobe = (p) => <I {...p} d={<><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.8 3 2.8 15 0 18"/><path d="M12 3c-2.8 3-2.8 15 0 18"/></>} />;
const IconFile = (p) => <I {...p} d={<><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z"/><polyline points="14 3 14 8 19 8"/></>} />;
const IconEdit = (p) => <I {...p} d={<><path d="M4 20h4l11-11-4-4L4 16v4z"/><path d="M14 6l4 4"/></>} />;
const IconX = (p) => <I {...p} d={<><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></>} />;
const IconClock = (p) => <I {...p} d={<><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></>} />;
const IconUpload = (p) => <I {...p} d={<><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><polyline points="8 8 12 4 16 8"/><line x1="12" y1="4" x2="12" y2="16"/></>} />;
const IconSpark = (p) => <I {...p} d={<path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z"/>} />;

// ---------- Router (hash-based) ----------
const RouterCtx = createContext(null);
const useRoute = () => useContext(RouterCtx);

function parseHash() {
  const h = window.location.hash.replace(/^#/, '') || '/loc_HRZ2042';
  const parts = h.split('/').filter(Boolean);
  return { locationId: parts[0] || 'loc_HRZ2042', page: parts[1] || 'home' };
}

function RouterProvider({ children }) {
  const [route, setRoute] = useState(parseHash());
  useEffect(() => {
    const onHash = () => { setRoute(parseHash()); window.scrollTo({ top: 0, behavior: 'instant' }); };
    window.addEventListener('hashchange', onHash);
    if (!window.location.hash) window.location.hash = '/loc_HRZ2042';
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const navigate = (page) => {
    window.location.hash = page === 'home' ? `/${route.locationId}` : `/${route.locationId}/${page}`;
  };
  return <RouterCtx.Provider value={{ ...route, navigate }}>{children}</RouterCtx.Provider>;
}

// ---------- Global state (steps) ----------
const STEPS_META = {
  form:     { key:'form',     idx:1, title:'Formulario de onboarding',     desc:'Información base de tu negocio',            block:'Tu negocio',    icon: IconFile,  required:true,  route:'formulario' },
  gmail:    { key:'gmail',    idx:2, title:'Conectar Gmail / Calendar',     desc:'Sincronización de citas y correo',          block:'Comunicación',  icon: IconMail,  required:true,  route:'gmail' },
  redes:    { key:'redes',    idx:3, title:'Conectar Facebook / Instagram', desc:'Entrada de leads desde tus redes sociales', block:'Captación',     icon: IconShare, required:true,  route:'redes' },
  whatsapp: { key:'whatsapp', idx:4, title:'Conectar WhatsApp Business',    desc:'Atención y notificaciones automáticas',     block:'Captación',     icon: IconWhats, required:true,  route:'whatsapp' },
  dominio:  { key:'dominio',  idx:5, title:'Configurar dominio',            desc:'Para tu landing page y funnels',            block:'Presencia web',  icon: IconGlobe, required:false, route:'dominio' },
};

const STORE_KEY = 'marcelo_onboarding_v1';

const initialState = {
  businessName: '',
  contactName: '',
  locationId: 'loc_HRZ2042',
  lastCheck: 'Hace 2 h · 14:20',
  steps: { form: true, gmail: false, whatsapp: false, redes: false, dominio: null },
  form: {
    empresa: 'Inmobiliaria Horizonte',
    rubro: 'Bienes raíces residenciales',
    producto: 'Venta y alquiler de propiedades residenciales premium en Medellín y el Valle de Aburrá. Asesoría integral desde la búsqueda hasta el cierre.',
    publico: 'Familias jóvenes y profesionales entre 30 y 50 años buscando primera vivienda o segunda propiedad en zonas como El Poblado, Envigado y Laureles.',
    primary: '#0F1A2E',
    secondary: '#D4A14A',
    logoName: 'horizonte-logo.svg',
    telefono: '+57 310 482 9105',
    email: 'contacto@horizonte.co',
    web: 'https://horizonte.co',
    instagram: '@horizonte.propiedades',
    facebook: 'facebook.com/horizontepropiedades',
    whats: '+57 310 482 9105',
    meet: 'https://meet.google.com/horizonte-citas',
  },
};

function useStore() {
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch {}
    return initialState;
  });
  useEffect(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch {}
  }, [state]);
  const patch = (p) => setState(s => ({ ...s, ...p }));
  const setStep = (k, v) => setState(s => ({ ...s, steps: { ...s.steps, [k]: v } }));
  const setForm = (f) => setState(s => ({ ...s, form: { ...s.form, ...f } }));
  return { state, patch, setStep, setForm, reset: () => setState(initialState) };
}
const StoreCtx = createContext(null);
const useStoreCtx = () => useContext(StoreCtx);

// ---------- Toast ----------
const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = (t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(ts => [...ts, { id, ...t }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 3400);
  };
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-2 max-w-sm">
        {toasts.map(t => (
          <div key={t.id} className="toast-in bg-navy-900 text-paper-50 rounded-lg shadow-cardHover px-4 py-3 flex items-start gap-3">
            <div className={`mt-0.5 w-5 h-5 rounded-full grid place-items-center ${t.kind==='ok' ? 'bg-gold-400 text-navy-900' : 'bg-gold-400 text-navy-900'}`}>
              <IconCheck size={12} stroke={2.5}/>
            </div>
            <div>
              <div className="text-sm font-medium">{t.title}</div>
              {t.desc && <div className="text-xs text-paper-300 mt-0.5">{t.desc}</div>}
            </div>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// ---------- Primitives ----------
function Badge({ tone='neutral', children, size='md' }) {
  const tones = {
    ok:      'bg-okbg text-ok',
    warn:    'bg-warnbg text-warn',
    neutral: 'bg-paper-100 text-ink-700',
    gold:    'bg-gold-100 text-gold-600',
    navy:    'bg-navy-900 text-paper-50',
  };
  const sizes = { sm: 'text-[10px] px-1.5 py-0.5', md: 'text-[11px] px-2 py-0.5' };
  return <span className={`inline-flex items-center gap-1 rounded-full uppercase tracking-[0.08em] font-medium ${tones[tone]} ${sizes[size]}`}>{children}</span>;
}

function Btn({ kind='primary', size='md', as='button', children, icon, iconRight, ...rest }) {
  const base = 'inline-flex items-center gap-2 justify-center font-medium rounded-md transition-all ring-focus select-none';
  const kinds = {
    primary:   'bg-navy-900 text-paper-50 hover:bg-navy-800 shadow-sm',
    gold:      'bg-gold-400 text-navy-900 hover:bg-gold-300 shadow-sm',
    ghost:     'text-ink-700 hover:text-navy-900 hover:bg-paper-100',
    outline:   'border hairline-strong text-navy-900 hover:bg-paper-100',
    quiet:     'text-navy-900 hover:bg-paper-100',
  };
  const sizes = { sm: 'text-xs px-3 h-8', md: 'text-sm px-4 h-10', lg: 'text-[15px] px-5 h-12' };
  const Cmp = as;
  return (
    <Cmp className={`${base} ${kinds[kind]} ${sizes[size]}`} {...rest}>
      {icon}{children}{iconRight}
    </Cmp>
  );
}

function Card({ children, className='', hover=false, as='div', ...rest }) {
  const Cmp = as;
  return (
    <Cmp className={`bg-white border hairline rounded-xl shadow-card ${hover ? 'hover:shadow-cardHover transition-shadow' : ''} ${className}`} {...rest}>
      {children}
    </Cmp>
  );
}

function StatusIcon({ status, size=20 }) {
  if (status === true) return <span className="w-5 h-5 rounded-full bg-ok text-white grid place-items-center"><IconCheck size={12} stroke={3}/></span>;
  if (status === 'error') return <span className="w-5 h-5 rounded-full bg-warn text-white grid place-items-center"><IconAlert size={12} stroke={2.5}/></span>;
  return <span className="w-5 h-5 rounded-full border-2 hairline-strong grid place-items-center bg-white" />;
}

// ---------- Header ----------
function Header({ locationId, businessName, contactName, logoEmpresa, progress, loading }) {
  const { done, total } = progress;
  const pct = total ? Math.round((done/total) * 100) : 0;
  return (
    <header className="bg-navy-900 text-paper-50 relative overflow-hidden noise">
      <div className="absolute inset-0 grid-bg opacity-60" />
      <div className="max-w-6xl mx-auto px-6 lg:px-10 relative">
        <div className="flex items-center justify-between py-4 border-b border-white/10">
          <a href={`#/${locationId}`} className="flex items-center gap-3 group">
  <img src="assets/marcelo-logo.png" alt="Marcelo" className="w-14 h-14 object-contain" />
  <div className="leading-tight">
              <div className="font-serif text-[18px] text-paper-50">Marcelo <span className="italic text-gold-300">CRM</span></div>
              <div className="text-[10px] uppercase tracking-[0.14em] text-paper-300/70">Portal de onboarding</div>
            </div>
          </a>
          <div className="hidden md:flex items-center gap-3 text-xs text-paper-300/80">
            <span className="font-mono">{locationId}</span>
            <span className="w-1 h-1 rounded-full bg-paper-300/40" />
            <span className="flex items-center gap-1.5"><IconClock size={12}/> Verificado hace 2 h</span>
          </div>
        </div>

        <div className="py-10 lg:py-14 grid lg:grid-cols-12 gap-8 items-end">
          <div className="lg:col-span-7">
            <div className="flex gap-6">
              <div>
                <div className="text-xs uppercase tracking-[0.18em] text-gold-300 mb-3">Hola, {contactName}</div>
                <h1 className="font-serif text-[44px] lg:text-[60px] leading-[1.02] text-paper-50">
              Conectemos <span className="italic text-gold-300">{businessName || 'la empresa'}</span><br/>
con las herramientas correctas.
                </h1>
                <p className="mt-5 text-paper-300/90 text-[15px] max-w-xl leading-relaxed">
              Cinco pasos rápidos para dejar tu CRM listo: integraciones con tus canales de comunicación, fuentes de leads y presencia web. La mayoría toma menos de 5 minutos.
                </p>
              </div>
            </div>
          </div>

          <div className="lg:col-span-5">
            {logoEmpresa && logoEmpresa.startsWith('http') && (
              <div className="flex justify-center mb-4">
                <div className="bg-white/10 border border-white/20 rounded-xl p-4 backdrop-blur-sm inline-flex items-center justify-center">
                  <img src={logoEmpresa} alt="Logo empresa" className="w-28 h-28 object-contain" />
                </div>
              </div>
            )}
            <div className="bg-white/5 border border-white/10 rounded-xl p-5 backdrop-blur-sm">
              <div className="flex items-baseline justify-between mb-3">
                <div className="text-xs uppercase tracking-[0.12em] text-paper-300/80">Progreso general</div>
                <div className="text-xs text-paper-300/60">{pct}%</div>
              </div>
              <div className="flex items-baseline gap-2 mb-4">
                {loading ? (
                  <div className="skeleton h-9 w-24" />
                ) : (
                  <>
                    <span className="font-serif text-5xl text-paper-50 num-pill">{done}</span>
                    <span className="text-ink-400/90">/ {total}</span>
                    <span className="ml-2 text-xs text-paper-300/70">pasos completados</span>
                  </>
                )}
              </div>
              <div className="h-1.5 bg-white/10 rounded-full overflow-hidden">
                <div className="h-full bg-gold-400 transition-[width] duration-700 ease-out" style={{ width: `${pct}%` }} />
              </div>
              <div className="mt-3 flex gap-1">
                {Array.from({length: total}).map((_,i) => (
                  <div key={i} className={`h-1 flex-1 rounded-full ${i < done ? 'bg-gold-400' : 'bg-white/10'}`} />
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  );
}

// ---------- Skeleton rows ----------
function SkeletonChecklist() {
  return (
    <div className="space-y-10">
      {[1,2,3,4].map(i => (
        <div key={i}>
          <div className="skeleton h-4 w-40 mb-4" />
          <div className="skeleton h-24 w-full rounded-xl" />
        </div>
      ))}
    </div>
  );
}

// ---------- Home page ----------
function HomePage() {
  const { state, setStep, setForm, patch } = useStoreCtx();
  const { navigate } = useRoute();
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const loc = new URLSearchParams(window.location.search).get('loc') || 'BrAkzvwuSYdO3sDC9DL3';
    fetch(`https://n8n.dimetrics.com.co/webhook/onboarding-load?loc=${encodeURIComponent(loc)}`)
      .then(r => r.json())
      .then(data => {
        if (!data) return;
        // Pre-llenar form
        setForm({
          empresa:   data.nombre_empresa   || '',
          rubro:     data.sector           || '',
          producto:  data.producto         || '',
          publico:   data.publico          || '',
          tono:      data.tono             || 'cercano',
          primary:   data.color_primario   || '#0F1A2E',
          secondary: data.color_secundario || '#D4A14A',
          logoName:  data.logo             || '',
          instagram: data.instagram        || '',
          whats:     data.whatsapp         || '',
          facebook:  data.facebook         || '',
          telefono:  data.telefono         || '',
          email:     data.onboarding_email || '',
          web:       data.sitio_web        || '',
        });
        // Actualizar estado del checklist desde validadores GHL
        if (data.validador_correo   !== '') setStep('gmail',    data.validador_correo   === 'si');
        if (data.validador_whatsapp !== '') setStep('whatsapp', data.validador_whatsapp === 'si');
        if (data.validador_redes    !== '') setStep('redes',    data.validador_redes    === 'si');
        if (data.validador_dominio  !== '') setStep('dominio',  data.validador_dominio  === 'si');
        if (data.nombre_contacto) patch({ contactName: data.nombre_contacto });
        if (data.nombre_empresa)  patch({ businessName: data.nombre_empresa });
      })
      .catch(err => console.error('Error cargando onboarding:', err))
      .finally(() => setLoading(false));
  }, []);

  const blocks = useMemo(() => {
    const grouped = {};
    Object.values(STEPS_META).forEach(m => {
      grouped[m.block] = grouped[m.block] || [];
      grouped[m.block].push(m);
    });
    return Object.entries(grouped);
  }, []);

  const requiredKeys = Object.values(STEPS_META).filter(m => m.required).map(m => m.key);
  const done = requiredKeys.filter(k => state.steps[k] === true).length + (state.steps.dominio === true ? 1 : 0);
  const total = 5;

  const nextPending = useMemo(() => {
    return Object.values(STEPS_META).find(m => m.required && state.steps[m.key] !== true);
  }, [state.steps]);

  return (
    <div>
      <Header locationId={state.locationId} businessName={state.businessName} contactName={state.contactName} logoEmpresa={state.form?.logoName || ''} progress={{ done, total }} loading={loading} />
      <main className="max-w-6xl mx-auto px-6 lg:px-10 py-12 lg:py-16">

            <h2 className="font-serif text-3xl lg:text-4xl text-navy-900">5 pasos para activar tu cuenta</h2>
          </div>
          {nextPending && (
            <Btn kind="gold" size="lg" onClick={() => navigate(nextPending.route)} iconRight={<IconArrowRight size={16}/>}>
              Ver siguiente paso pendiente
            </Btn>
          )}
          {!nextPending && <Badge tone="ok" size="md">Todos los requeridos completos</Badge>}
        </div>

        {loading ? <SkeletonChecklist /> : (
          <div className="space-y-12 fade-in">
            {blocks.map(([blockName, items], bi) => (
              <section key={blockName} className="grid lg:grid-cols-12 gap-6 lg:gap-10">
                <div className="lg:col-span-3">
                  <div className="flex items-start gap-3">
                    <div className="font-serif text-4xl text-gold-400 leading-none num-pill">0{bi+1}</div>
                    <div>
                      <div className="text-[11px] uppercase tracking-[0.18em] text-ink-500">Bloque</div>
                      <div className="font-serif text-xl text-navy-900 mt-0.5">{blockName}</div>
                    </div>
                  </div>
                </div>
                <div className="lg:col-span-9 space-y-3">
                  {items.map(meta => (
                    <StepCard key={meta.key} meta={meta} status={state.steps[meta.key]} />
                  ))}
                </div>
              </section>
            ))}
          </div>
        )}

        {/* Footer note */}
        <div className="mt-16 pt-8 border-t hairline flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div className="flex items-start gap-3 text-sm text-ink-500">

            </div>
          </div>
          <div className="text-xs text-ink-500 font-mono">{state.locationId}</div>

      </main>

}

function validate(k, v) {
  const s = (v ?? '').toString().trim();
  const REQ = ['empresa','rubro','producto','publico','tono','telefono','email','resultado','cta'];
  if (REQ.includes(k) && !s) return 'Este campo es obligatorio';
  if (k === 'email' && s && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s)) return 'Formato de correo inválido';
  if (k === 'telefono' && s && s.replace(/\D/g,'').length < 7) return 'Número demasiado corto';
  if (k === 'web' && s && !/^https?:\/\//i.test(s)) return 'Debe empezar con http:// o https://';
  return null;
}

const STEP_FIELDS = {
  identidad:  ['empresa','rubro','producto','publico'],
  propuesta:  ['problema','resultado','diferenciador','objecion','cta'],
  voz:        ['tono','primary','secondary'],
  contacto:   ['telefono','email','web'],

  calendario: ['cal_nombre','cal_duracion','cal_reunion','cal_max_dia','cal_gestion'],
};

function stepIsValid(stepId, draft) {
  return STEP_FIELDS[stepId].every(k => !validate(k, draft[k]));
}

                  ? ['No saben en quién confiar','No encuentran la propiedad ideal','Miedo a tomar una mala decisión','Proceso muy complicado']
                  : r.includes('Seguros')
                  ? ['No entienden qué póliza necesitan','Miedo a pagar de más','No confían en las aseguradoras','Proceso muy burocrático']
                  : r.includes('Educación')
                  ? ['No tienen tiempo para estudiar','Cursos que no dan resultados reales','No saben por dónde empezar','Precio muy alto']
                  : r.includes('Salud')
                  ? ['No encuentran un especialista de confianza','Largas esperas para citas','Tratamientos muy costosos','Miedo al diagnóstico']
                  : ['Les cuesta conseguir clientes','Procesos ineficientes','No tienen tiempo','Falta de confianza en el mercado'];
                const DIF_PRESETS = ['Experiencia comprobada','Resultados garantizados','Atención personalizada','Precio justo','Metodología propia'];
                const OBJ_PRESETS = ['El precio les parece alto','No confían todavía','Ya lo intentaron antes y no funcionó','No tienen tiempo ahora','No ven la urgencia'];

                const objId       = OBJ_PRESETS.includes(draft.objecion)       ? draft.objecion      : (draft.objecion      ? '__otro_o' : '');
                return (
                  <div className="mt-8 space-y-8">
                    <div className="space-y-3">

                        label="¿Cuál es el mayor problema que resuelves?"
                        options={[...PROB_PRESETS.map(l=>({id:l,label:l})), {id:'__otro_p',label:'Otro'}]}

                        onChange={v => update('problema', v === '__otro_p' ? '' : v)}

                      onChange={v=>update('resultado',v)}

                      rows={2}
                      placeholder="Ej: En 90 días duplican sus leads sin aumentar su presupuesto de pauta"

                    <div className="space-y-3">
                      <ChipGroup
                        label="¿Qué te hace diferente a la competencia?"

                        selectedId={difId}
                        onChange={v => update('diferenciador', v === '__otro_d' ? '' : v)}
                        variant="contacto"
                      />
                      {!DIF_PRESETS.includes(draft.diferenciador) && (
                        <FloatingInput label="Tu diferenciador" value={draft.diferenciador} onChange={v=>update('diferenciador',v)}/>
                      )}
                    </div>
                    <div className="space-y-3">
                      <ChipGroup
                        label="¿Por qué un cliente duda en contratarte?"
                        options={[...OBJ_PRESETS.map(l=>({id:l,label:l})), {id:'__otro_o',label:'Otro'}]}
                        selectedId={objId}
                        onChange={v => update('objecion', v === '__otro_o' ? '' : v)}
                        variant="contacto"
                      />
                      {!OBJ_PRESETS.includes(draft.objecion) && (
                        <FloatingInput label="La principal objeción" value={draft.objecion} onChange={v=>update('objecion',v)}/>
                      )}
                    </div>
                    <ChipGroup
                      label="¿Qué quieres que haga el cliente cuando esté listo?"
                      required
                      options={[
                        {id:'Agendar una llamada',   label:'Agendar una llamada'},
                        {id:'Solicitar una demo',    label:'Solicitar una demo'},
                        {id:'Comprar directamente',  label:'Comprar directamente'},
                        {id:'Escribir por WhatsApp', label:'Escribir por WhatsApp'},
                        {id:'Visitar mi sitio web',  label:'Visitar mi sitio web'},
                      ]}
                      selectedId={draft.cta}
                      onChange={v => { update('cta', v); setTouched(t=>({...t,cta:true})); setErrors(e=>({...e,cta:null})); }}
                      error={touched.cta && errors.cta}
                      variant="contacto"
                    />
                  </div>
                );
              })()}
              {currentStep.id === 'voz' && loading && (
                <FormSkeleton kind="voz" />
              )}
              {currentStep.id === 'voz' && !loading && (
                <div className="mt-8 space-y-8">
                  <ChipGroup
                    label="Tono de comunicación"
                    required
                    options={TONOS}
                    value={draft.tono}
                    onChange={v => { update('tono', v); setTouched(t=>({...t,tono:true})); setErrors(e=>({...e,tono:null})); }}
                    selectedId={draft.tono}
                    error={touched.tono && errors.tono}
                    variant="tone"
                  />
                  <div className="grid md:grid-cols-2 gap-5">
                    <FloatingColor label="Color primario" value={draft.primary} onChange={v=>update('primary',v)} onBlur={()=>blur('primary')} touched={touched.primary} />
                    <FloatingColor label="Color secundario" value={draft.secondary} onChange={v=>update('secondary',v)} onBlur={()=>blur('secondary')} touched={touched.secondary} />
                    <div className="md:col-span-2">
                      <LogoDropWizard fileName={draft.logoName} onChange={(name, base64) => { update('logoName', name); update('logoBase64', base64); }}/>

                <FormSkeleton kind="contacto" />

                  <FloatingInput label="Email del negocio" type="email" value={draft.email} onChange={v=>update('email',v)} onBlur={()=>blur('email')} error={touched.email && errors.email} touched={touched.email} required/>

              )}

                  <FloatingInput label="Facebook" value={draft.facebook} onChange={v=>update('facebook',v)} onBlur={()=>blur('facebook')} touched={touched.facebook} placeholder="URL de tu página"/>
                  <FloatingInput label="WhatsApp de negocio" type="tel" value={draft.whats} onChange={v=>update('whats',v)} onBlur={()=>blur('whats')} touched={touched.whats}/>
                  <FloatingInput label="Link de Zoom / Meet" value={draft.meet} onChange={v=>update('meet',v)} onBlur={()=>blur('meet')} touched={touched.meet} placeholder="https://"/>
                </div>
              )}
              {currentStep.id === 'calendario' && (
                <div className="mt-6 space-y-8">
                  <span className="inline-flex items-center gap-1.5 text-[10px] uppercase tracking-[0.14em] font-medium text-ink-500 bg-paper-100 border hairline rounded-full px-3 py-1">Opcional</span>

                  <div className="space-y-3">
                    <ChipGroup
                      label="¿Cómo se llamará esta cita?"
                      options={[
                        { id:'Consulta gratuita',      label:'Consulta gratuita' },
                        { id:'Demo del producto',      label:'Demo del producto' },
                        { id:'Asesoría inicial',       label:'Asesoría inicial' },
                        { id:'Reunión de seguimiento', label:'Reunión de seguimiento' },
                        { id:'__otro',                 label:'Otro' },
                      ]}
                      selectedId={
                        ['Consulta gratuita','Demo del producto','Asesoría inicial','Reunión de seguimiento'].includes(draft.cal_nombre)
                          ? draft.cal_nombre
                          : draft.cal_nombre ? '__otro' : ''
                      }
                      onChange={v => update('cal_nombre', v === '__otro' ? '' : v)}
                      variant="contacto"
                    />
                    {!['Consulta gratuita','Demo del producto','Asesoría inicial','Reunión de seguimiento'].includes(draft.cal_nombre) && (
                      <FloatingInput label="Nombre personalizado de la cita" value={draft.cal_nombre} onChange={v => update('cal_nombre', v)}/>
                    )}
                  </div>

                  <ChipGroup
                    label="¿Cuánto dura cada cita?"
                    options={[
                      { id:'15', label:'15 min' },
                      { id:'30', label:'30 min' },
                      { id:'45', label:'45 min' },
                      { id:'60', label:'60 min' },
                      { id:'90', label:'90 min' },
                    ]}
                    selectedId={draft.cal_duracion}
                    onChange={v => update('cal_duracion', v)}
                    variant="chips5"
                  />

                  <ChipGroup
                    label="¿Dónde se reúnen con el cliente?"
                    options={[
                      { id:'googlemeet', label:'Google Meet',        desc:'Videollamada vía Google' },
                      { id:'zoom',       label:'Zoom',               desc:'Videollamada vía Zoom' },
                      { id:'teams',      label:'Microsoft Teams',    desc:'Videollamada vía Teams' },
                      { id:'telefono',   label:'Llamada telefónica', desc:'Sin video, solo llamada' },
                      { id:'presencial', label:'Presencial',         desc:'En persona, sin video' },
                    ]}
                    selectedId={draft.cal_reunion}
                    onChange={v => update('cal_reunion', v)}
                    variant="tone"
                  />

                  <ChipGroup
                    label="¿Cuántas citas máximo quieres al día?"
                    options={[
                      { id:'0',  label:'Sin límite' },
                      { id:'3',  label:'3' },
                      { id:'5',  label:'5' },
                      { id:'8',  label:'8' },
                      { id:'10', label:'10' },
                    ]}
                    selectedId={draft.cal_max_dia}
                    onChange={v => update('cal_max_dia', v)}
                    variant="chips5"
                  />

                  <ChipGroup
                    label="¿Pueden tus clientes reagendar o cancelar solos?"
                    options={[
                      { id:'si', label:'Sí, sin problema', desc:'Se gestionan solos sin escribirte' },
                      { id:'no', label:'No, me contactan',  desc:'Deben escribirte para cualquier cambio' },
                    ]}
                    selectedId={draft.cal_gestion}
                    onChange={v => update('cal_gestion', v)}
                    variant="tone"
                  />
                </div>
              )}
            </div>
          </div>

          {/* Nav buttons */}
          <div className="mt-10 pt-6 border-t hairline flex items-center justify-between gap-4">
            <Btn kind="ghost" onClick={back} disabled={stepIdx === 0 || saveState === 'saving'} icon={<IconArrowLeft size={16}/>}>
              Atrás
            </Btn>
            <div className={`text-xs min-h-[20px] ${currentStep.id === 'calendario' ? '' : 'hidden sm:block'}`}>
              {currentStep.id === 'calendario' ? (
                <Btn kind="ghost" size="sm" onClick={() => { update('cal_omitir', true); setDir(1); setStepIdx(WIZARD_STEPS.length); }} iconRight={<IconArrowRight size={14}/>}>
                  Omitir este paso
                </Btn>
              ) : saveState === 'saving' ? (
                <span className="inline-flex items-center gap-2 text-ink-500">
                  <span className="inline-block w-3.5 h-3.5 rounded-full border-2 border-paper-300 border-t-gold-400 animate-spin" />
                  Guardando…
                </span>
              ) : saveState === 'saved' ? (
                <span className="inline-flex items-center gap-1.5 text-emerald-700 fade-in">
                  <IconCheck size={13} stroke={2.5}/> Guardado
                </span>
              ) : saveState === 'error' ? (
                <span className="inline-flex items-center gap-1.5 text-warn fade-in">
                  <IconAlert size={12} stroke={2.5}/> No se pudo guardar
                </span>
              ) : (
                <span className="text-ink-500">
                  Paso <span className="font-mono text-navy-900">{stepIdx+1}</span> de {WIZARD_STEPS.length}
                </span>
              )}
            </div>
            <Btn
              kind="gold"
              onClick={next}
              disabled={!canAdvance || saveState === 'saving'}
              size="lg"
              icon={saveState === 'saving' ? (
                <span className="inline-block w-3.5 h-3.5 rounded-full border-2 border-navy-900/30 border-t-navy-900 animate-spin" />
              ) : null}
              iconRight={saveState === 'saving' ? null : (isLast ? <IconCheck size={16} stroke={2.5}/> : <IconArrowRight size={16}/>)}
            >
              {saveState === 'saving' ? 'Guardando…' : (isLast ? 'Revisar y confirmar' : 'Siguiente')}
            </Btn>
          </div>
          </>
          )}
        </>
      ) : (
        <SuccessScreen draft={draft} onDone={() => navigate('home')} />
      )}
    </DetailLayout>
  );
}

function WizardProgress({ steps, current, pct, onJump }) {
  return (
    <div className="-mt-2">
      <div className="flex items-baseline justify-between mb-3">
        <div className="text-[11px] uppercase tracking-[0.14em] text-ink-500">Progreso del formulario</div>
        <div className="text-xs text-ink-500 num-pill">{pct}%</div>
      </div>
      <div className="h-1.5 bg-paper-200 rounded-full overflow-hidden relative">
        <div className="absolute inset-y-0 left-0 bg-gold-400 rounded-full transition-[width] duration-500 ease-out" style={{ width: `${pct}%` }}/>
      </div>
      <div className="mt-4 grid grid-cols-4 gap-3">
        {steps.map((s, i) => {
          const state = i < current ? 'done' : i === current ? 'active' : 'todo';
          return (
            <button key={s.id} onClick={()=>onJump(i)} disabled={i >= current}
              className={`text-left p-3 rounded-lg border transition-all ${
                state==='active' ? 'bg-navy-900 text-paper-50 border-navy-900' :
                state==='done' ? 'bg-white border-ok/30 hover:border-ok text-navy-900' :
                'bg-paper-50/50 border-transparent text-ink-500'
              }`}>
              <div className="flex items-center gap-2 mb-1">
                <span className={`w-5 h-5 rounded-full grid place-items-center text-[10px] font-mono ${
                  state==='active' ? 'bg-gold-400 text-navy-900' :
                  state==='done' ? 'bg-ok text-white' :
                  'bg-paper-200 text-ink-500'
                }`}>
                  {state === 'done' ? <IconCheck size={10} stroke={3}/> : i+1}
                </span>
                <span className={`text-[10px] uppercase tracking-[0.12em] ${state==='active' ? 'text-gold-300':''}`}>
                  {state==='active' ? 'En curso' : state==='done' ? 'Completado' : 'Siguiente'}
                </span>
              </div>
              <div className={`text-sm font-medium ${state==='active' ? 'text-paper-50' : ''}`}>{s.title}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function StepHeader({ num, total, title, desc }) {
  return (
    <div className="flex items-start gap-4">
      <div className="font-serif text-5xl text-gold-400 leading-none num-pill">{num}</div>
      <div>
        <div className="text-[11px] uppercase tracking-[0.16em] text-ink-500">Paso {num} de 0{total}</div>
        <h2 className="font-serif text-3xl text-navy-900 mt-1">{title}</h2>
        <p className="text-sm text-ink-500 mt-2 max-w-xl leading-relaxed">{desc}</p>
      </div>
    </div>
  );
}

function FloatingInput({ label, value='', onChange, onBlur, error, touched, required, type='text', placeholder, full }) {
  const [focused, setFocused] = useState(false);
  const floaty = focused || !!value;
  const showOk = touched && !error && !!(value||'').toString().trim();
  const showErr = !!error;
  return (
    <div className={`${full ? 'md:col-span-2' : ''}`}>
      <label className={`relative block rounded-md border bg-white transition-all ${
        showErr ? 'border-warn' : focused ? 'border-navy-700' : 'hairline-strong'
      }`}>
        <span className={`pointer-events-none absolute left-3 transition-all duration-200 ${
          floaty
            ? 'top-1 text-[10px] uppercase tracking-[0.12em] text-ink-500'
            : 'top-1/2 -translate-y-1/2 text-[14px] text-ink-500'
        } ${focused && !showErr ? 'text-navy-700' : ''} ${showErr ? 'text-warn' : ''}`}>
          {label}{required && <span className={showErr ? 'text-warn' : 'text-gold-500'}> *</span>}
        </span>
        <input
          type={type}
          value={value || ''}
          placeholder={floaty ? (placeholder || '') : ''}
          onFocus={()=>setFocused(true)}
          onBlur={(e)=>{ setFocused(false); onBlur?.(e); }}
          onChange={e => onChange(e.target.value)}
          className="w-full bg-transparent outline-none pt-5 pb-1.5 px-3 pr-9 text-[14px] text-navy-900"
        />
        {showOk && (
          <span className="absolute right-2.5 top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-ok text-white grid place-items-center">
            <IconCheck size={11} stroke={3}/>
          </span>
        )}
        {showErr && (
          <span className="absolute right-2.5 top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-warn text-white grid place-items-center">
            <IconAlert size={11} stroke={2.5}/>
          </span>
        )}
      </label>
      {showErr && <div className="text-xs text-warn mt-1.5 flex items-center gap-1"><IconAlert size={11} stroke={2}/> {error}</div>}
    </div>
  );
}

function FloatingTextarea({ label, value='', onChange, onBlur, error, touched, required, rows=3, full, placeholder }) {
  const [focused, setFocused] = useState(false);
  const floaty = focused || !!value;
  const showOk = touched && !error && !!(value||'').toString().trim();
  const showErr = !!error;
  return (
    <div className={full ? 'md:col-span-2' : ''}>
      <label className={`relative block rounded-md border bg-white transition-all ${
        showErr ? 'border-warn' : focused ? 'border-navy-700' : 'hairline-strong'
      }`}>
        <span className={`pointer-events-none absolute left-3 transition-all duration-200 ${
          floaty
            ? 'top-1.5 text-[10px] uppercase tracking-[0.12em] text-ink-500'
            : 'top-3 text-[14px] text-ink-500'
        } ${focused && !showErr ? 'text-navy-700' : ''} ${showErr ? 'text-warn' : ''}`}>
          {label}{required && <span className={showErr ? 'text-warn' : 'text-gold-500'}> *</span>}
        </span>
        <textarea
          rows={rows}

        {showOk && (
          <span className="absolute right-2.5 top-2.5 w-5 h-5 rounded-full bg-ok text-white grid place-items-center">
            <IconCheck size={11} stroke={3}/>
          </span>
        )}
        {showErr && (
          <span className="absolute right-2.5 top-2.5 w-5 h-5 rounded-full bg-warn text-white grid place-items-center">
            <IconAlert size={11} stroke={2.5}/>
          </span>
        )}
      </label>
      {showErr && <div className="text-xs text-warn mt-1.5 flex items-center gap-1"><IconAlert size={11} stroke={2}/> {error}</div>}

function FloatingColor({ label, value, onChange, onBlur, touched }) {
  const [focused, setFocused] = useState(false);
  const [open, setOpen] = useState(false);
  const anchorRef = useRef(null);
  return (
    <div className="relative">
      <label className={`relative block rounded-md border bg-white transition-all ${focused ? 'border-navy-700' : 'hairline-strong'}`}>
        <span className="absolute left-3 top-1 text-[10px] uppercase tracking-[0.12em] text-ink-500">{label}</span>
        <div ref={anchorRef} className="flex items-center gap-3 pt-5 pb-1.5 px-3">
          <button
            type="button"
            onClick={(e) => { e.preventDefault(); setOpen(o => !o); }}
            aria-label="Abrir selector de color"
            className="w-7 h-7 rounded-md border hairline flex-shrink-0 shadow-inset hover:ring-2 hover:ring-gold-300 transition-all"
            style={{ background: value }}
          />
          <input
            value={value}
            onFocus={()=>setFocused(true)}
            onBlur={(e)=>{ setFocused(false); onBlur?.(e); }}
            onChange={e => onChange(e.target.value)}
            className="flex-1 bg-transparent outline-none text-[14px] font-mono text-navy-900 uppercase"
          />
          <button
            type="button"
            onClick={(e) => { e.preventDefault(); setOpen(o => !o); }}
            className="text-[10px] uppercase tracking-[0.12em] text-ink-500 hover:text-navy-900 transition-colors"
          >
            {open ? 'Cerrar' : 'Elegir'}
          </button>
        </div>
      </label>
      {open && (
        <ColorPickerPopover
          initial={value}
          onClose={() => setOpen(false)}
          onApply={(hex) => { onChange(hex); setOpen(false); }}
        />
      )}
    </div>
  );
}

// ---------- Splash Screen ----------
const SPLASH_VIDEO = 'https://raw.githubusercontent.com/daniells97/videomarcelo/main/Cinematic_Brand_Intro_Video_Generation.mp4';

function SplashScreen({ fadingOut, onContinue }) {
  const videoRef = useRef(null);
  const [showBtn, setShowBtn] = useState(false);
  const [videoFailed, setVideoFailed] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setShowBtn(true), 3000);
    return () => clearTimeout(t);
  }, []);

  // Prevent page scroll while splash active
  useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);

  const particles = useMemo(() => Array.from({length: 28}, (_,i) => ({
    id: i,
    left: Math.random() * 100,
    top: 60 + Math.random() * 40,
    size: 2 + Math.random() * 5,
    dur: 6 + Math.random() * 8,
    delay: Math.random() * 6,
    dx: (Math.random() - 0.5) * 120,
    dy: -120 - Math.random() * 180,
  })), []);

  return (
    <div className={`fixed inset-0 z-[100] ${fadingOut ? 'splash-fade-out' : 'splash-fade-in'}`} style={{ width: '100vw', height: '100vh', overflow: 'hidden', position: 'relative', background: '#0d0d0f' }}>
      {/* Video layer */}
      {!videoFailed && (
        <video
          ref={videoRef}
          src={SPLASH_VIDEO}
          autoPlay
          muted
          playsInline
          loop={false}
          onEnded={() => setShowBtn(true)}
          onError={() => setVideoFailed(true)}
          style={{
            width: '100%',
            height: '100%',
            objectFit: 'contain',
            objectPosition: 'center center',
            display: 'block',
            background: '#0d0d0f',
          }}
        />
      )}

      {/* Top mask — hide '9K:16' watermark */}
      {!videoFailed && (
        <div style={{ position:'absolute', top:0, left:0, width:'100%', height:'160px', zIndex:5, background:'linear-gradient(to bottom, #0d0d0f 0%, #0d0d0f 60%, transparent 100%)', pointerEvents:'none' }} />
      )}
      {/* Bottom mask — hide watermark */}
      {!videoFailed && (

// ---------- Color utils ----------
function hexToRgb(hex) {
  const h = (hex || '').replace('#','').trim();
  const s = h.length === 3 ? h.split('').map(c=>c+c).join('') : h;
  if (!/^[0-9a-fA-F]{6}$/.test(s)) return null;
  return { r: parseInt(s.slice(0,2),16), g: parseInt(s.slice(2,4),16), b: parseInt(s.slice(4,6),16) };
}
function rgbToHex(r,g,b) {
  const to = (v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2,'0');
  return ('#' + to(r) + to(g) + to(b)).toUpperCase();
}
function rgbToHsv(r,g,b) {
  r/=255; g/=255; b/=255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g-b)/d) % 6;
    else if (max === g) h = (b-r)/d + 2;
    else h = (r-g)/d + 4;
    h *= 60; if (h < 0) h += 360;
  }
  const s = max === 0 ? 0 : d/max;
  return { h, s, v: max };
}
function hsvToRgb(h,s,v) {
  const c = v*s, x = c * (1 - Math.abs(((h/60) % 2) - 1)), m = v - c;
  let r=0,g=0,b=0;
  if (h<60)      { r=c; g=x; b=0; }
  else if (h<120){ r=x; g=c; b=0; }
  else if (h<180){ r=0; g=c; b=x; }
  else if (h<240){ r=0; g=x; b=c; }
  else if (h<300){ r=x; g=0; b=c; }
  else           { r=c; g=0; b=x; }
  return { r:(r+m)*255, g:(g+m)*255, b:(b+m)*255 };
}

function ColorPickerPopover({ initial, onApply, onClose }) {
  const W = 260, H = 150;
  const ref = useRef(null);
  const canvasRef = useRef(null);
  const hueCanvasRef = useRef(null);
  const satRef = useRef(null);
  const hueRef = useRef(null);

  const rgb0 = hexToRgb(initial) || { r:15, g:26, b:46 };
  const hsv0 = rgbToHsv(rgb0.r, rgb0.g, rgb0.b);
  const [h, setH] = useState(hsv0.h);
  const [s, setS] = useState(hsv0.s);
  const [v, setV] = useState(hsv0.v);
  const [hexInput, setHexInput] = useState(initial?.toUpperCase() || '#');

  const rgb = hsvToRgb(h,s,v);
  const hex = rgbToHex(rgb.r, rgb.g, rgb.b);

  useEffect(() => { setHexInput(hex); }, [hex]);

  // outside click
  useEffect(() => {
    const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const onKey  = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('mousedown', onDown);
    document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDown); document.removeEventListener('keydown', onKey); };
  }, [onClose]);

  // draw SV canvas
  useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    // base hue
    const base = hsvToRgb(h, 1, 1);
    ctx.fillStyle = rgbToHex(base.r, base.g, base.b);
    ctx.fillRect(0,0,W,H);
    // white gradient left->right
    const gx = ctx.createLinearGradient(0,0,W,0);
    gx.addColorStop(0, 'rgba(255,255,255,1)');
    gx.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gx; ctx.fillRect(0,0,W,H);
    // black gradient top->bottom
    const gy = ctx.createLinearGradient(0,0,0,H);
    gy.addColorStop(0, 'rgba(0,0,0,0)');
    gy.addColorStop(1, 'rgba(0,0,0,1)');
    ctx.fillStyle = gy; ctx.fillRect(0,0,W,H);
  }, [h]);

  // draw hue strip
  useEffect(() => {
    const c = hueCanvasRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0,0,W,0);
    const stops = [0,60,120,180,240,300,360];
    stops.forEach(stop => {
      const rgb = hsvToRgb(stop % 360, 1, 1);
      g.addColorStop(stop/360, rgbToHex(rgb.r,rgb.g,rgb.b));
    });
    ctx.fillStyle = g; ctx.fillRect(0,0,W,14);
  }, []);

  const pickSat = (e) => {
    const rect = satRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(W, (e.clientX ?? e.touches?.[0]?.clientX) - rect.left));
    const y = Math.max(0, Math.min(H, (e.clientY ?? e.touches?.[0]?.clientY) - rect.top));
    setS(x / W); setV(1 - y / H);
  };
  const pickHue = (e) => {
    const rect = hueRef.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(W, (e.clientX ?? e.touches?.[0]?.clientX) - rect.left));
    setH((x / W) * 360);
  };
  const dragBind = (handler) => {
    const onMove = (e) => handler(e);
    const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    return (e) => { handler(e); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp); };
  };

  const onHexInput = (e) => {
    const val = e.target.value;
    setHexInput(val.toUpperCase());
    const rgb = hexToRgb(val);
    if (rgb) {
      const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
      setH(hsv.h); setS(hsv.s); setV(hsv.v);
    }
  };

  const swatches = ['#0F1A2E','#D4A14A','#1F7A5A','#B85C1E','#F6E9C9','#FFFFFF','#334672','#E3C06A'];

  return (
    <div
      ref={ref}
      className="absolute z-50 top-full mt-2 left-0 bg-navy-900 text-paper-50 rounded-[12px] shadow-cardHover border border-white/10 p-4 w-[292px] fade-in"
      style={{ boxShadow: '0 24px 60px -20px rgba(10,19,34,0.5), 0 8px 20px -8px rgba(10,19,34,0.4)' }}
      onClick={(e) => e.stopPropagation()}
    >
      {/* SV canvas */}
      <div
        ref={satRef}
        onMouseDown={dragBind(pickSat)}
        className="relative cursor-crosshair rounded-lg overflow-hidden select-none"
        style={{ width: W, height: H }}
      >
        <canvas ref={canvasRef} width={W} height={H} className="block"/>
        <div
          className="absolute w-4 h-4 rounded-full border-2 border-white pointer-events-none"
          style={{
            left: s*W - 8, top: (1-v)*H - 8,
            boxShadow: '0 0 0 1px rgba(0,0,0,0.35), 0 2px 4px rgba(0,0,0,0.3)',
            background: hex,
          }}
        />
      </div>

      {/* Hue slider */}
      <div
        ref={hueRef}
        onMouseDown={dragBind(pickHue)}
        className="relative mt-3 cursor-pointer rounded-full overflow-hidden select-none"
        style={{ width: W, height: 14 }}
      >
        <canvas ref={hueCanvasRef} width={W} height={14} className="block"/>
        <div
          className="absolute top-1/2 -translate-y-1/2 w-4 h-4 rounded-full bg-white border-2 border-navy-900 pointer-events-none"
          style={{
            left: (h/360)*W - 8,
            boxShadow: '0 0 0 1px rgba(255,255,255,0.4), 0 2px 4px rgba(0,0,0,0.4)',
          }}
        />
      </div>

      {/* Hex + preview */}
      <div className="mt-3 flex items-center gap-3">
        <div className="flex-1">
          <div className="text-[9px] uppercase tracking-[0.14em] text-paper-300/70 mb-1">Hex</div>
          <input
            value={hexInput}
            onChange={onHexInput}
            className="w-full bg-white/5 border border-white/10 rounded-md px-2.5 h-8 text-[13px] font-mono text-paper-50 outline-none focus:border-gold-300 uppercase"
          />
        </div>
        <div className="flex-1">
          <div className="text-[9px] uppercase tracking-[0.14em] text-paper-300/70 mb-1">Antes / Después</div>
          <div className="h-8 rounded-md border border-white/10 overflow-hidden flex">
            <div className="flex-1" style={{ background: initial }} title="Anterior"/>
            <div className="flex-1" style={{ background: hex }} title="Nuevo"/>
          </div>
        </div>
      </div>

      {/* Swatches */}
      <div className="mt-3">
        <div className="text-[9px] uppercase tracking-[0.14em] text-paper-300/70 mb-1.5">Sugeridos</div>
        <div className="flex gap-1.5 flex-wrap">
          {swatches.map(sw => (
            <button
              key={sw}
              type="button"
              onClick={() => {
                const rgb = hexToRgb(sw); const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
                setH(hsv.h); setS(hsv.s); setV(hsv.v);
              }}
              className="w-6 h-6 rounded-md border border-white/15 hover:scale-110 transition-transform"
              style={{ background: sw }}
              aria-label={sw}
            />
          ))}
        </div>
      </div>

      {/* Actions */}
      <div className="mt-4 flex items-center justify-between gap-2">
        <button
          type="button"
          onClick={onClose}
          className="text-xs text-paper-300/80 hover:text-paper-50 px-3 h-9 rounded-md transition-colors"
        >
          Cancelar
        </button>
        <button
          type="button"
          onClick={() => onApply(hex)}
          className="inline-flex items-center gap-1.5 bg-gold-400 text-navy-900 text-sm font-medium h-9 px-4 rounded-md hover:bg-gold-300 transition-colors"
        >
          <IconCheck size={14} stroke={2.5}/> Aplicar
        </button>
      </div>
    </div>
  );
}

function LogoDropWizard({ fileName, onChange }) {
  const ref = useRef(null);
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState('');

  const handleFile = (file) => {
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      setError('El archivo supera los 2 MB. Elige una imagen más pequeña.');
      return;
    }
    setError('');
    const reader = new FileReader();
    reader.onload = (e) => {
      setPreview(e.target.result);
      onChange(file.name, e.target.result); // nombre + base64
    };
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <div className="border-2 border-dashed border-gold-300 bg-gold-50/30 rounded-lg p-4 flex items-center gap-4">
        <div className="w-14 h-14 rounded-md bg-white border hairline grid place-items-center flex-shrink-0 overflow-hidden">
          {preview
            ? <img src={preview} alt="Logo" className="w-full h-full object-contain" />
            : <span className="font-serif text-2xl text-navy-900">IH</span>
          }
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-[11px] uppercase tracking-[0.12em] text-ink-500 mb-0.5">Logo</div>
          <div className="text-[14px] text-navy-900 font-medium truncate">{fileName || 'Sin logo cargado'}</div>
          <div className="text-xs text-ink-500">PNG o SVG · máx 2 MB · fondo transparente</div>
        </div>
        <input
          type="file"
          ref={ref}
          accept="image/png,image/svg+xml,image/jpeg,image/webp"
          className="hidden"
          onChange={e => handleFile(e.target.files?.[0])}
        />
        <Btn kind="outline" size="sm" icon={<IconUpload size={14}/>} onClick={() => ref.current?.click()}>
          Reemplazar
        </Btn>
      </div>
      {error && (
        <div className="text-xs text-warn mt-1.5 flex items-center gap-1">
          <IconAlert size={11} stroke={2}/> {error}
        </div>
      )}
    </div>
  );
}

// --- Confetti ---
function fireConfetti() {
  const c = document.createElement('canvas');
  c.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:60;';
  c.width = window.innerWidth; c.height = window.innerHeight;
  document.body.appendChild(c);
  const ctx = c.getContext('2d');
  const colors = ['#D4A14A','#0F1A2E','#E3C06A','#1F7A5A','#F6E9C9'];
  const N = 140;
  const parts = Array.from({length:N}, () => ({
    x: c.width/2 + (Math.random()-0.5)*120,
    y: c.height/2 - 40,
    vx: (Math.random()-0.5)*12,
    vy: (Math.random()*-12)-4,
    g: 0.35 + Math.random()*0.2,
    r: 3 + Math.random()*4,
    c: colors[(Math.random()*colors.length)|0],
    rot: Math.random()*Math.PI,
    vr: (Math.random()-0.5)*0.3,
    life: 0,
  }));
  let start = performance.now();
  function frame(t) {
    const dt = (t - start); start = t;
    ctx.clearRect(0,0,c.width,c.height);
    parts.forEach(p => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life += dt;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      ctx.globalAlpha = Math.max(0, 1 - p.life/2500);
      ctx.fillRect(-p.r, -p.r*0.4, p.r*2, p.r*0.8);
      ctx.restore();
    });
    if (parts.some(p => p.life < 2500)) requestAnimationFrame(frame);
    else c.remove();
  }
  requestAnimationFrame(frame);
}

  const store = useStore();

  let Page;
  switch (page) {

    <StoreCtx.Provider value={store}>

        <div className="fade-in" key={page}><Page /></div>
      </ToastProvider>
    </StoreCtx.Provider>
  );
}
